{% extends 'base.html' %}
{% block content %}
<div class="container" style="margin-top: 100px; margin-bottom: 60px;">
    <h2 class="fw-bold mb-4">🧾 Checkout</h2>
    <div class="row">
        <div class="col-md-7 mb-4">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">📦 Delivery Details</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" placeholder="+254 700 000 000" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Delivery Address</label>
                            <textarea name="address" class="form-control" rows="3" 
                                      placeholder="Street, Area, City" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning fw-bold w-100">
                            ✅ Place Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">🛒 Order Summary</h5>
                </div>
                <div class="card-body">
                    {% for item in cart_items %}
                    <div class="d-flex justify-content-between mb-2">
                        <span>{{ item['name'] }} x{{ item['quantity'] }}</span>
                        <span class="fw-bold">KSh {{ "%.2f"|format(item['price'] * item['quantity']) }}</span>
                    </div>
                    {% endfor %}
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold fs-5">Total</span>
                        <span class="fw-bold fs-5 text-warning">KSh {{ "%.2f"|format(total) }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
