{% extends 'base.html' %}
{% block content %}
<div class="container" style="margin-top: 100px; margin-bottom: 60px;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">✏️ Edit Product</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Product Name</label>
                            <input type="text" name="name" class="form-control" value="{{ product[1] }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Price (KSh)</label>
                            <input type="number" name="price" class="form-control" value="{{ product[2] }}" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description" class="form-control" rows="3">{{ product[3] }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Category</label>
                            <input type="text" name="category" class="form-control" value="{{ product[5] }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Product Image</label>
                            {% if product[4] %}
                            <div class="mb-2">
                                <img src="{{ url_for('static', filename='images/products/' + product[4]) }}" 
                                     height="80" class="rounded">
                                <small class="text-muted ms-2">Current image</small>
                            </div>
                            {% endif %}
                            <input type="file" name="image" class="form-control" accept="image/*">
                            <small class="text-muted">Leave empty to keep current image</small>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning fw-bold">💾 Save Changes</button>
                            <a href="{{ url_for('admin') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
