{% extends 'base.html' %}
{% block content %}
<div class="container" style="margin-top: 40px; margin-bottom: 60px;">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h4 class="fw-bold text-center mb-4">🛍️ Welcome Back</h4>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="john@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Your password" required>
                    </div>
                    <button type="submit" class="btn btn-warning fw-bold w-100">Login</button>
                </form>
                <hr>
                <p class="text-center text-muted mb-0">Don't have an account? 
                    <a href="{{ url_for('register') }}" class="text-warning fw-bold">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
